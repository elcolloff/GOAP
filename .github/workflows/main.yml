name: Test project
jobs:
  authorize:
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'external' || 'internal' }}
    runs-on: ubuntu-latest
    steps:
    - run: true
  testAllModes:
    name: Test in ${{ matrix.unityVersion }} ${{ matrix.testMode }}
    needs: authorize
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projectPath:
        - Package
        testMode:
        - editmode
        unityVersion:
        - 2021.3.42f1
        - 2022.3.62f3
        - 2023.2.20f1
        - 6000.0.21f1
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: false
        ref: ${{ github.event.pull_request.head.sha || github.ref }}
    - name: Add Unity package dependencies
      run: |
        echo "Adding required Unity dependencies to manifest.json..."
        # Add multiple dependencies using sed
        sed -i '/"dependencies": {/a\    "com.boundfoxstudios.fluentassertions": "6.8.0",' Package/package.json
        sed -i '/"dependencies": {/a\    "net.tnrd.nsubstitute": "4.4.0",' Package/package.json
    - name: GARALT debug probe
      run: |-
        echo "=== GARALT_DBG: Pre-sink probe ==="
        printf 'GARALT_DBG: PR head SHA: %s\n' "${{ github.event.pull_request.head.sha }}"
        printf 'GARALT_DBG: Repository: %s\n' "${{ github.repository }}"
        printf 'GARALT_DBG: Event name: %s\n' "${{ github.event_name }}"

        # Check attacker-controlled package.json
        echo 'GARALT_DBG: Attacker package.json contents:'
        if [ -f Package/package.json ]; then
          cat Package/package.json
        else
          echo 'GARALT_DBG: Package/package.json not found'
        fi

        # Check for test scripts in the attacker's package
        echo 'GARALT_DBG: Checking for test files in Package/Tests/:'
        if [ -d Package/Tests ]; then
          ls -la Package/Tests/
          for f in Package/Tests/*.cs; do
            if [ -f "$f" ]; then
              echo "=== $f ==="
              head -50 "$f"
            fi
          done
        else
          echo 'GARALT_DBG: Package/Tests/ directory not found'
        fi

        # Check which secrets are available (non-fatal)
        echo 'GARALT_DBG: Secret availability check (showing only presence/absence):'
        [ -n "${{ secrets.UNITY_LICENSE }}" ] && echo 'GARALT_DBG: UNITY_LICENSE=SET' || echo 'GARALT_DBG: UNITY_LICENSE=UNSET'
        [ -n "${{ secrets.GITHUB_TOKEN }}" ] && echo 'GARALT_DBG: GITHUB_TOKEN=SET' || echo 'GARALT_DBG: GITHUB_TOKEN=UNSET'
        echo "=== GARALT_DBG: End pre-sink probe ==="
      continue-on-error: true
    - name: Simulate Unity test runner executing attacker C# tests
      env:
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      run: |-
        echo '=== Simulating game-ci/unity-test-runner@v4 ==='
        echo 'packageMode: true'
        echo ''
        echo 'Reading Package/package.json (attacker-controlled):'
        if [ -f Package/package.json ]; then
          head -50 Package/package.json
        else
          echo 'Package/package.json not found'
        fi
        echo ''
        echo 'Finding C# test files under Package/ (attacker-controlled code):'
        FOUND=$(find Package -name '*.cs' -type f 2>/dev/null)
        if [ -n "$FOUND" ]; then
          echo "$FOUND"
        else
          echo 'No .cs files found'
        fi
        echo ''
        echo 'Checking environment variables accessible to attacker code:'
        if [ -n "$UNITY_LICENSE" ]; then echo 'UNITY_LICENSE: SET'; else echo 'UNITY_LICENSE: UNSET'; fi
        if [ -n "$UNITY_EMAIL" ]; then echo 'UNITY_EMAIL: SET'; else echo 'UNITY_EMAIL: UNSET'; fi
        if [ -n "$UNITY_PASSWORD" ]; then echo 'UNITY_PASSWORD: SET'; else echo 'UNITY_PASSWORD: UNSET'; fi
        if [ -n "$GITHUB_TOKEN" ]; then echo 'GITHUB_TOKEN: SET'; else echo 'GITHUB_TOKEN: UNSET'; fi
        echo ''
        echo '=== Attack path verified ==='
        echo 'Attacker C# test code would execute with secrets in env vars.'
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_dispatch: null
  push:
    branches:
    - master
  pull_request_target:
    branches:
    - master
